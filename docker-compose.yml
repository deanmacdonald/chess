version: '3.8'
services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    depends_on:
      - backend
      - frontend

      php-engine:
  image: php:apache
  container_name: php-engine
  ports:
    - "8081:80"
  volumes:
    - ./php-engine:/var/www/html
