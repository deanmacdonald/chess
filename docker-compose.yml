services:
  backend:
    build: ./backend
    container_name: flask_backend
    expose:
      - "5000"
    restart: always
    networks:
      - webnet

  nginx:
    image: nginx:stable
    container_name: nginx_proxy
    ports:
      - "8080:80"  # Host port 8080 maps to container port 80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf  # Mount the actual config file
    depends_on:
      - backend
    restart: always
    networks:
      - webnet

networks:
  webnet:

